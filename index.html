    <title>PiCoBlock</title>
    
    <style>
        #pre-loading {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-color: var(--theme-primary, #4ECDC4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            z-index: -9999;
        }
        #pre-loading-title {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        #pre-loading-subtitle {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            color: var(--theme-subtext, rgba(255,255,255,0.6));
        }
        .pl-ring { fill: none; stroke-linecap: round; transform-origin: 100px 100px; }
        .pl-r1 { stroke: var(--theme-ring1, #E3FAFC); stroke-width: 9; animation: pl-cw  2.0s linear infinite; }
        .pl-r2 { stroke: var(--theme-ring2, #74C0FC); stroke-width: 9; animation: pl-ccw 1.7s linear infinite; }
        .pl-r3 { stroke: var(--theme-ring3, #1098AD); stroke-width: 9; animation: pl-cw  1.5s linear infinite; }
        .pl-r4 { stroke: var(--theme-ring4, #0B7285); stroke-width: 9; animation: pl-ccw 1.3s linear infinite; }
        .pl-r5 { stroke: var(--theme-ring1, #E3FAFC); stroke-width: 9; animation: pl-cw  1.1s linear infinite; }
        .pl-r6 { stroke: var(--theme-ring2, #74C0FC); stroke-width: 9; animation: pl-ccw 0.9s linear infinite; }
        .pl-r7 { stroke: var(--theme-ring3, #1098AD); stroke-width: 9; animation: pl-cw  0.7s linear infinite; }
        @keyframes pl-cw  { to { transform: rotate( 360deg); } }
        @keyframes pl-ccw { to { transform: rotate(-360deg); } }
    </style>
